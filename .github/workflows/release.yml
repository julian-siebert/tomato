name: Publish
on:
  push:
    tags: ["v[0-9]*.[0-9]*.[0-9]*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate semver tag
        run: |
          if ! echo "${GITHUB_REF_NAME}" | grep -qP '^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(-[a-zA-Z0-9.-]+)?(\+[a-zA-Z0-9.-]+)?$'; then
            echo "Tag ${GITHUB_REF_NAME} is not a valid semver tag (expected vX.Y.Z)"
            exit 1
          fi

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          cargo install protoc-gen-prost
          cargo install protoc-gen-prost-crate
          cargo install protoc-gen-tonic

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install buffy
        run: cargo install --git https://github.com/julian-siebert/buffy

      - name: Configure SSH for Go publish
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GO_DEPLOY_KEY }}
          
      - name: Configure git identity
        run: |
          git config --global user.email "mail@julian-siebert.de"
          git config --global user.name "julian-siebert"
          
      - name: Publish stubs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: buffy --version ${{ steps.version.outputs.VERSION }} --publish
